<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color cards</title>
    <style>
        body {
            background-color: darkgrey;
        }
        .container {
            padding: 20px;
            text-align: center; 
        }

       .card {
        height: 200px;
        width: 400px;
        border-radius: 10px;
        text-align: center;
        padding: 40px;
        color: white;
        font-weight: bold;
        margin-bottom: 20px;
       }

       .orange {
        background-color: orange;
       }

       .red {
        background-color: red;
       }

       .green {
        background-color: green;
       }

       .blue {
        background-color: blue;
       }

       .brown {
        background-color: brown;
       }

       .white {
        background-color: aliceblue;
       }

       h1 {
        color: black;
        padding: 20px;
       }

    </style>
</head>
<body>
    <h1>DIFFERENT COLOURS CARD </h1>
    <div class="container">
        <div class="card orange">
          <h1>ORANGE</h1>
          </div>
        <div class="card red">
            <h1>RED</h1>
            </div>
        <div class="card green">
            <h1>GREEN</h1>
            </div>
        <div class="card blue">
            <h1>BLUE</h1>
            </div>
        <div class="card brown">
            <h1>BROWN</h1>
            </div>
        <div class="card white">
            <h1>WHITE</h1>
            </div>
        </div>
    </div>
</body>
</html>
