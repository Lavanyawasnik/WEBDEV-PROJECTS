<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: rgb(106, 8, 115);
            margin: 0%;
            padding: 0%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: beige;
            border-radius: 20px;
            padding: 30px;
            height: 20%;
            width: 15%;
        }
        h2 {
            color: blue;
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background-color: beige;
            border: 1px solid black;
            
        }
        button {
            background-color: rgb(113, 113, 231);
            color: aliceblue;
            border-radius: 8px;
        }
        border :hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>LOGIN</h2>
        <form>
            <input type="email" name="" id="" placeholder="email">
            <input type="password" name="" id="" placeholder="password">
            <button type="submit">SUBMIT</button>
        </form>
    </div>
    
</body>
</html>
