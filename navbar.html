<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navigation project</title>
</head>
<body>
<div class="nav-container">
    <h2>variation 1: horizontal with underline effect</h2>
    <nav class="nav1">
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">PRODUCTS</a></li>
            <li><button class="login-btn">LOGIN</button></li>
        </ul>
    </nav>
    <h2>variation 2: Vertical with hover effect</h2>
    <nav class="nav2">
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">PRODUCTS</a></li>
            <li><button class="sub-btn">SUBMIT</button></li>
        </ul>
    </nav>
    <h2>variation 3: Horizontal with dropdown</h2>
    <nav class="nav3">
        <ul>
            <li><a href="#">HOME</a></li>
            <li class="dropdown">
            <a href="#">ABOUT</a>
            <div class = "dropdown-content">
                <a href="#">Story</a>
                <a href="#">Team</a>
                <a href="#">Contact</a>
            </div>
            </li>
            <li><a href="#">PRODUCTS</a></li>
            <li><button class="sub-btn">SUBMIT</button></li>
        </ul>
    </nav>
    
</div>
<style>
    body{
        margin: 0;
        padding: 20px;
        background-color: black;
        color: white;
    }
    .nav-container {
        margin-bottom: 60px;
    }
    h2 {
        margin-bottom: 10px;
    }
    .nav1{
        background-color: rgb(132, 86, 146);
        padding: 10px;
    }
    .nav1 ul{
        list-style-type: none;
        display: flex;
        justify-content: space-around;
    }
    .nav1 a{
        text-decoration: none;
        color: black;
        position: relative;
    }
    .nav1 .login-btn {
        background-color: burlywood;
        color: black;
        border: none;
    }
    .nav1 a::after {
        content: "";
        position: absolute;
        height: 2px;
        width: 100%;
        bottom: 0;
        left: 0;
        background-color: blue;
        transform: scaleX(0);
        transition: transform 0.3s 
        ease-in-out;
    }
    .nav1 a:hover::after {
        transform: scaleX(1);
    }
    .nav2{
        background-color: aquamarine;
        width: 200px;
        padding: 20px;
    }
    .nav2 ul{
        list-style-type: none;
        margin: 0;
        padding: 0;
    }
    .nav2 li{
        margin-bottom: 12px;
    }
    .nav2 a{
        text-decoration: none;
        color: rgb(34, 38, 5);
        display: block;
        padding: 10px;
        width: 100%;
    }
    .nav2 a:hover{
        background-color: rgb(82, 179, 82);
    }
    .nav2 .sub-btn {
        background-color: rgb(41, 41, 203);
        color: aliceblue;
        border: none;
        width: 100%;
        padding: 10px;
        cursor: pointer;
    }
    .nav2 .sub-btn:hover{
        background-color: rgb(6, 6, 71);
        border: 1px solid white;
    }
    .nav3 {
        background-color: coral;
        padding: 10px;
    }
    .nav3 ul{
        list-style-type: none;
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }
    .nav3 a{
        text-decoration: none;
        color: aliceblue;
        padding: 10px;
        display: block;
    }
    .nav3 .dropdown-content{
        display: none;
    }
    .nav3 .dropdown:hover .dropdown-content{
        display: block;
        position: absolute;
        background-color: brown;
        min-width: 150px;
    }
    .nav3 a:hover{
        background-color: rgb(101, 17, 17);
    }

</style>
    
</body>
</html>
